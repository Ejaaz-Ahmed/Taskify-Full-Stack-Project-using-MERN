trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - server/**

variables:
  - group: taskapp-variables
  - name: imageTag
    value: $(Build.BuildId)

stages:
- stage: SAST
  displayName: 'Security - SAST (SonarQube)'
  jobs:
  - job: SonarScan
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - checkout: self
      fetchDepth: 0
    - task: SonarQubePrepare@7
      inputs:
        SonarQube: 'sonarqube-connection'
        scannerMode: 'CLI'
        configMode: 'manual'
        cliProjectKey: 'taskapp-backend'
        cliProjectName: 'Task App Backend'
        cliSources: 'server/'
        extraProperties: |
          sonar.exclusions=**/node_modules/**
          sonar.javascript.file.suffixes=.js,.jsx
    - task: SonarQubeAnalyze@7
    - task: SonarQubePublish@7
      inputs:
        pollingTimeoutSec: '300'

- stage: SCA
  displayName: 'Security - SCA (Snyk)'
  dependsOn: SAST
  condition: succeeded()
  jobs:
  - job: SnykScan
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - checkout: self
    - task: SnykSecurityScan@1
      displayName: 'Snyk - Scan Backend Dependencies'
      inputs:
        serviceConnectionEndpoint: 'snyk-connection'
        testType: 'app'
        targetFile: 'server/package.json'
        failOnIssues: true
        monitorWhen: 'always'
        additionalArguments: '--severity-threshold=high'

- stage: Build
  displayName: 'Build and Push Backend Image'
  dependsOn: SCA
  condition: succeeded()
  jobs:
    - job: BuildJob
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - checkout: self

        - task: Docker@2
          displayName: 'Login to ACR'
          inputs:
            command: login
            containerRegistry: acr-service-connection

        - task: Docker@2
          displayName: 'Build Backend Image'
          inputs:
            command: build
            repository: $(DOCKER_REGISTRY)/$(BACKEND_IMAGE_NAME)
            dockerfile: server/Dockerfile
            buildContext: server/
            tags: |
              $(imageTag)
              latest

        - task: Docker@2
          displayName: 'Push Backend Image to ACR'
          inputs:
            command: push
            repository: $(DOCKER_REGISTRY)/$(BACKEND_IMAGE_NAME)
            tags: |
              $(imageTag)
              latest

- stage: DeployDev
  displayName: 'Deploy to Development'
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
  jobs:
    - job: DeployDevJob
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - task: AzureWebAppContainer@1
          displayName: 'Deploy Backend to Dev App Service'
          inputs:
            azureSubscription: $(AZURE_SUBSCRIPTION)
            appName: $(BACKEND_APP_NAME)
            containers: $(DOCKER_REGISTRY)/$(BACKEND_IMAGE_NAME):$(imageTag)

# DAST stage - runs only on develop branch after successful deployment
- stage: DAST
  displayName: 'Security - DAST (OWASP ZAP)'
  dependsOn: DeployDev
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
  jobs:
  - job: ZapScan
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - checkout: none
    - script: |
        mkdir -p $(Build.ArtifactStagingDirectory)/zap-reports
      displayName: 'Create report directory'
    - script: |
        docker run --rm \
          -v $(Build.ArtifactStagingDirectory)/zap-reports:/zap/wrk \
          zaproxy/zap-stable \
          zap-baseline.py \
          -t http://20.6.130.6 \
          -r zap-report.html \
          -I
      displayName: 'Run ZAP Baseline Scan'
      continueOnError: true
    - task: PublishBuildArtifacts@1
      displayName: 'Publish ZAP Report'
      inputs:
        pathToPublish: $(Build.ArtifactStagingDirectory)/zap-reports
        artifactName: 'zap-security-reports'
      condition: always()

- stage: DeployProd
  displayName: 'Deploy to Production'
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
    - job: DeployProdJob
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - task: AzureWebAppContainer@1
          displayName: 'Deploy Backend to Prod App Service'
          inputs:
            azureSubscription: $(AZURE_SUBSCRIPTION)
            appName: $(BACKEND_APP_NAME)
            containers: $(DOCKER_REGISTRY)/$(BACKEND_IMAGE_NAME):$(imageTag)
